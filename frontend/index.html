<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lab Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --text: #e2e2f0;
      --muted: #5a5a7a;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Barlow', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      animation: fadeUp 0.8s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 1.2rem;
      opacity: 0.8;
    }

    h1 {
      font-size: clamp(2.2rem, 6vw, 3.8rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 0.6rem;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      font-size: 1rem;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 3.5rem;
      letter-spacing: 0.04em;
    }

    .cards {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2.5rem 2rem;
      width: 220px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, transform 0.3s;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0,229,255,0.05), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover::before { opacity: 1; }
    .card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
    }

    .card-icon {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    .card h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    .card p {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .card-tag {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.8rem;
      display: block;
    }

    .footer {
      position: fixed;
      bottom: 1.5rem;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">// College Lab Management System</div>
    <h1>LAB <span>MANAGER</span></h1>
    <p class="subtitle">Device tracking &amp; student session control</p>

    <div class="cards">
      <a href="admin-login.html" class="card">
        <span class="card-tag">01 / Admin</span>
        <div class="card-icon">🔐</div>
        <h2>Admin Portal</h2>
        <p>Manage labs, view device status and student sessions</p>
      </a>

      <a href="student-form.html" class="card">
        <span class="card-tag">02 / Student</span>
        <div class="card-icon">🖥️</div>
        <h2>Student Entry</h2>
        <p>Log in or log out from your assigned lab device</p>
      </a>
    </div>
  </div>

  <div class="footer">SYS:READY &nbsp;|&nbsp; LAB-MANAGER v1.0</div>
</body>
</html>
