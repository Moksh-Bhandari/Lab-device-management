<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Lab Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #00e5ff;
      --text: #e2e2f0;
      --muted: #5a5a7a;
      --error: #ff4d6d;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Barlow', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .box {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2.5rem 2.5rem;
      width: 100%;
      max-width: 400px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .back {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.1em;
      display: inline-block;
      margin-bottom: 1.8rem;
      transition: color 0.2s;
    }
    .back:hover { color: var(--accent); }

    .tag {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--accent);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 2rem;
      letter-spacing: -0.01em;
    }

    .field {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.9rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--accent); }

    .btn {
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.85rem;
      background: var(--accent);
      color: #0a0a0f;
      font-family: var(--mono);
      font-size: 0.85rem;
      font-weight: bold;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .error-msg {
      margin-top: 1rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--error);
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div class="box">
    <a href="index.html" class="back">← BACK</a>
    <div class="tag">// Admin Access</div>
    <h1>Sign In</h1>

    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="admin" autocomplete="off"/>
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••"/>
    </div>

    <button class="btn" id="loginBtn" onclick="doLogin()">LOGIN →</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <script>
    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');

      if (!username || !password) {
        showError('Username and password are required');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'AUTHENTICATING...';
      err.style.display = 'none';

      try {
        const res = await fetch('http://127.0.0.1:5000/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('admin_id', data.admin_id);
          localStorage.setItem('admin_username', data.username);
          window.location.href = 'admin-dashboard.html';
        } else {
          showError(data.error || 'Login failed');
        }
      } catch (e) {
        showError('Cannot connect to server. Is Flask running?');
      } finally {
        btn.disabled = false;
        btn.textContent = 'LOGIN →';
      }
    }

    function showError(msg) {
      const err = document.getElementById('errorMsg');
      err.textContent = msg;
      err.style.display = 'block';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
