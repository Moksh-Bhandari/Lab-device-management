<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Details — Lab Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #00e5ff;
      --text: #e2e2f0;
      --muted: #5a5a7a;
      --error: #ff4d6d;
      --success: #10b981;
      --warning: #f59e0b;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Barlow', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .box {
      position: relative; z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2.5rem;
      width: 100%; max-width: 540px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .back {
      font-family: var(--mono); font-size: 0.65rem;
      color: var(--muted); text-decoration: none;
      letter-spacing: 0.1em; display: inline-block;
      margin-bottom: 1.8rem; transition: color 0.2s;
    }
    .back:hover { color: var(--accent); }

    .tag {
      font-family: var(--mono); font-size: 0.65rem;
      color: var(--accent); letter-spacing: 0.2em; margin-bottom: 0.5rem;
    }

    h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 2rem; }

    .field { margin-bottom: 1.2rem; }

    label {
      display: block; font-family: var(--mono); font-size: 0.65rem;
      color: var(--muted); letter-spacing: 0.15em;
      text-transform: uppercase; margin-bottom: 0.5rem;
    }

    input, select {
      width: 100%; background: var(--bg);
      border: 1px solid var(--border); border-radius: 3px;
      color: var(--text); font-family: var(--mono);
      font-size: 0.9rem; padding: 0.75rem 1rem;
      outline: none; transition: border-color 0.2s; appearance: none;
    }
    input:focus, select:focus { border-color: var(--accent); }
    select option { background: var(--surface); }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }

    .toggle-indicator {
      display: flex; align-items: center; gap: 1rem;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 3px; padding: 0.9rem 1rem; margin-bottom: 1.8rem;
    }

    .toggle-track {
      position: relative; width: 52px; height: 26px;
      background: #1e1e2e; border-radius: 13px; flex-shrink: 0;
    }
    .toggle-thumb {
      position: absolute; top: 3px; left: 3px;
      width: 20px; height: 20px; background: var(--muted);
      border-radius: 50%; transition: left 0.3s, background 0.3s;
    }
    .toggle-track.on { background: rgba(16,185,129,0.15); border: 1px solid var(--success); }
    .toggle-track.on .toggle-thumb { left: 29px; background: var(--success); }

    .toggle-label { font-family: var(--mono); font-size: 0.8rem; }
    .toggle-label.on  { color: var(--success); }
    .toggle-label.off { color: var(--muted); }

    .btn {
      width: 100%; margin-top: 1rem; padding: 0.85rem;
      font-family: var(--mono); font-size: 0.85rem;
      font-weight: bold; letter-spacing: 0.15em;
      text-transform: uppercase; border: none; border-radius: 3px;
      cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #0a0a0f; }
    .btn-danger  { background: var(--error);  color: #fff; }
    .btn-warning { background: transparent; color: var(--warning); border: 1px solid var(--warning); }
    .btn-primary:hover:not(:disabled) { opacity: 0.85; }
    .btn-danger:hover:not(:disabled)  { opacity: 0.85; }
    .btn-warning:hover:not(:disabled) { background: rgba(245,158,11,0.08); }

    .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

    .msg {
      margin-top: 0.8rem; font-family: var(--mono); font-size: 0.75rem;
      text-align: center; display: none; padding: 0.6rem; border-radius: 3px;
    }
    .msg.error   { display: block; color: var(--error);   background: rgba(255,77,109,0.08);  border: 1px solid rgba(255,77,109,0.2); }
    .msg.success { display: block; color: var(--success); background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.2); }

    .session-info {
      font-family: var(--mono); font-size: 0.72rem;
      color: var(--muted); line-height: 2;
    }
    .session-info span { color: var(--accent); }

    .hint { font-family: var(--mono); font-size: 0.6rem; color: var(--muted); margin-top: 0.4rem; }

    #step1, #step2-login, #step2-logout { display: none; }
    #step1 { display: block; }
  </style>
</head>
<body>
<div class="box">
  <a href="index.html" class="back">← BACK</a>
  <div class="tag">// Student Entry</div>
  <h1>Lab Session</h1>

  <!-- STEP 1: Roll number check -->
  <div id="step1">
    <div class="field">
      <label>Roll Number</label>
      <input type="text" id="checkRoll" placeholder="e.g. 2023IT001" autocomplete="off"/>
    </div>
    <button class="btn btn-primary" onclick="checkStatus()">CHECK STATUS →</button>
    <div class="msg" id="checkMsg"></div>
  </div>

  <!-- STEP 2A: Login form -->
  <div id="step2-login">
    <div class="toggle-indicator">
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
      <span class="toggle-label off">LOGGED OUT</span>
    </div>

    <div class="row2">
      <div class="field">
        <label>Lab Number</label>
        <select id="labSelect" onchange="onLabChange()">
          <option value="">Select Lab</option>
        </select>
      </div>
      <div class="field">
        <label>Device Number</label>
        <input type="number" id="deviceNumber" placeholder="e.g. 5" min="1"/>
        <div class="hint">Read the sticker on your PC</div>
      </div>
    </div>

    <div class="field">
      <label>Full Name</label>
      <input type="text" id="studentName" placeholder="e.g. Rahul Sharma"/>
    </div>

    <div class="field">
      <label>Roll Number</label>
      <input type="text" id="rollDisplay" readonly style="opacity:0.6; cursor:not-allowed;"/>
    </div>

    <div class="row3">
      <div class="field">
        <label>Year</label>
        <select id="year">
          <option value="">Select</option>
          <option>FE</option>
          <option>SE</option>
          <option>TE</option>
          <option>BE</option>
        </select>
      </div>
      <div class="field">
        <label>Department</label>
        <select id="department">
          <option value="">Select</option>
          <option>CS</option>
          <option>IT</option>
          <option>AIML</option>
          <option>Mechanical</option>
          <option>Civil</option>
          <option>DS</option>
        </select>
      </div>
      <div class="field">
        <label>Division</label>
        <input type="text" id="division" placeholder="e.g. A"/>
      </div>
    </div>

    <button class="btn btn-primary" onclick="doLogin()">LOG IN →</button>
    <button class="btn btn-warning" onclick="reportDamaged()">⚠ REPORT THIS PC AS DAMAGED</button>
    <div class="msg" id="loginMsg"></div>
  </div>

  <!-- STEP 2B: Logout screen -->
  <div id="step2-logout">
    <div class="toggle-indicator">
      <div class="toggle-track on"><div class="toggle-thumb"></div></div>
      <span class="toggle-label on">LOGGED IN</span>
    </div>

    <div class="session-info" id="sessionInfo"></div>

    <hr class="divider"/>
    <p style="font-size:0.88rem; color:var(--muted); margin-bottom:0.5rem;">
      Active session found. Log out to release your device.
    </p>

    <button class="btn btn-danger" onclick="doLogout()">LOG OUT →</button>

    <!-- Report damaged while logged in — session stays active -->
    <button class="btn btn-warning" id="reportDamagedBtn" onclick="reportDamagedFromSession()">⚠ REPORT THIS PC AS DAMAGED</button>

    <div class="msg" id="logoutMsg"></div>
  </div>
</div>

<script>
  const API = 'http://127.0.0.1:5000';
  const SYSTEM_ADMIN_ID = 1;

  let currentRoll    = '';
  let activeIssueId  = null;
  let activeDeviceId = null;

  // ── STEP 1: Check roll number ─────────────────────
  async function checkStatus() {
    const roll = document.getElementById('checkRoll').value.trim();
    if (!roll) { showMsg('checkMsg', 'Enter your roll number', 'error'); return; }
    currentRoll = roll;

    try {
      const res  = await fetch(`${API}/api/student/status`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ student_rollnumber: roll })
      });
      const data = await res.json();

      if (data.status === 'logged_in') {
        activeIssueId  = data.issue_id;
        activeDeviceId = data.device_id;
        document.getElementById('sessionInfo').innerHTML =
          `Roll No: <span>${roll}</span><br>Device ID: <span>#${data.device_id}</span><br>Status: <span>ACTIVE</span>`;
        // Reset the report button visibility every time we enter logout screen
        document.getElementById('reportDamagedBtn').style.display = '';
        document.getElementById('logoutMsg').className = 'msg';
        show('step2-logout');
      } else {
        document.getElementById('rollDisplay').value = roll;
        await loadLabs();
        show('step2-login');
      }
    } catch(e) {
      showMsg('checkMsg', 'Cannot connect to server', 'error');
    }
  }

  // ── Load labs dropdown ────────────────────────────
  async function loadLabs() {
    const sel = document.getElementById('labSelect');
    try {
      const res  = await fetch(`${API}/api/labs`);
      const labs = await res.json();
      sel.innerHTML = '<option value="">Select Lab</option>';
      for (const lab of labs) {
        sel.innerHTML += `<option value="${lab.lab_id}">Lab ${lab.lab_number}</option>`;
      }
    } catch(e) {}
  }

  function onLabChange() {}

  // ── Resolve device_id from lab + device_number ────
  async function resolveDevice(labId, devNum) {
    const res     = await fetch(`${API}/api/devices/${labId}`);
    const devices = await res.json();
    return devices.find(d => d.device_number == parseInt(devNum)) || null;
  }

  // ── LOGIN ─────────────────────────────────────────
  async function doLogin() {
    const name     = document.getElementById('studentName').value.trim();
    const dept     = document.getElementById('department').value;
    const year     = document.getElementById('year').value;
    const division = document.getElementById('division').value.trim();
    const devNum   = document.getElementById('deviceNumber').value.trim();
    const labId    = document.getElementById('labSelect').value;

    if (!name || !dept || !year || !division || !devNum || !labId) {
      showMsg('loginMsg', 'Please fill all fields', 'error'); return;
    }

    let device;
    try {
      device = await resolveDevice(labId, devNum);
    } catch(e) {
      showMsg('loginMsg', 'Could not verify device', 'error'); return;
    }

    if (!device)                    { showMsg('loginMsg', `PC ${devNum} not found in this lab`, 'error'); return; }
    if (device.status === 'Issued') { showMsg('loginMsg', `PC ${devNum} is already in use`, 'error'); return; }
    if (device.status === 'Damaged'){ showMsg('loginMsg', `PC ${devNum} is marked as damaged`, 'error'); return; }

    try {
      const res  = await fetch(`${API}/api/student/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          student_rollnumber: currentRoll,
          student_name: name,
          department: dept,
          year, division,
          device_id: device.device_id,
          admin_id: SYSTEM_ADMIN_ID
        })
      });
      const data = await res.json();
      if (res.ok) {
        showMsg('loginMsg', 'Logged in successfully!', 'success');
        setTimeout(resetToStep1, 1800);
      } else {
        showMsg('loginMsg', data.error || 'Login failed', 'error');
      }
    } catch(e) {
      showMsg('loginMsg', 'Server error', 'error');
    }
  }

  // ── LOGOUT ────────────────────────────────────────
  async function doLogout() {
    if (!activeIssueId) return;
    try {
      const res  = await fetch(`${API}/api/student/logout`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ issue_id: activeIssueId })
      });
      const data = await res.json();
      if (res.ok) {
        showMsg('logoutMsg', 'Logged out successfully!', 'success');
        setTimeout(resetToStep1, 1800);
      } else {
        showMsg('logoutMsg', data.error || 'Logout failed', 'error');
      }
    } catch(e) {
      showMsg('logoutMsg', 'Server error', 'error');
    }
  }

  // ── REPORT DAMAGED from login screen ─────────────
  async function reportDamaged() {
    const labId  = document.getElementById('labSelect').value;
    const devNum = document.getElementById('deviceNumber').value.trim();
    if (!labId || !devNum) {
      showMsg('loginMsg', 'Select lab and enter device number first', 'error'); return;
    }
    let device;
    try { device = await resolveDevice(labId, devNum); }
    catch(e) { showMsg('loginMsg', 'Could not verify device', 'error'); return; }
    if (!device) { showMsg('loginMsg', `PC ${devNum} not found`, 'error'); return; }
    await markDamaged(device.device_id, 'loginMsg', false);
  }

  // ── REPORT DAMAGED while session is active ────────
  // Session stays active — student remains logged in
  async function reportDamagedFromSession() {
    if (!activeDeviceId) return;
    try {
      const res  = await fetch(`${API}/api/devices/report-damaged`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ device_id: activeDeviceId })
      });
      const data = await res.json();
      if (res.ok) {
        // Show success but keep session active — do NOT reset
        showMsg('logoutMsg', 'PC reported as damaged. Your session is still active.', 'success');
        // Hide button so student cannot report twice
        document.getElementById('reportDamagedBtn').style.display = 'none';
      } else {
        showMsg('logoutMsg', data.error || 'Failed to report', 'error');
      }
    } catch(e) {
      showMsg('logoutMsg', 'Server error', 'error');
    }
  }

  async function markDamaged(deviceId, msgId, resetAfter = true) {
    try {
      const res  = await fetch(`${API}/api/devices/report-damaged`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ device_id: deviceId })
      });
      const data = await res.json();
      if (res.ok) {
        showMsg(msgId, 'PC reported as damaged. Thank you.', 'success');
        if (resetAfter) setTimeout(resetToStep1, 2000);
      } else {
        showMsg(msgId, data.error || 'Failed to report', 'error');
      }
    } catch(e) {
      showMsg(msgId, 'Server error', 'error');
    }
  }

  // ── HELPERS ───────────────────────────────────────
  function show(stepId) {
    ['step1','step2-login','step2-logout'].forEach(id => {
      document.getElementById(id).style.display = id === stepId ? 'block' : 'none';
    });
  }

  function resetToStep1() {
    activeIssueId = activeDeviceId = null;
    currentRoll = '';
    document.getElementById('checkRoll').value = '';
    document.getElementById('checkMsg').className = 'msg';
    document.getElementById('reportDamagedBtn').style.display = '';
    show('step1');
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg ' + type;
  }
</script>
</body>
</html>
